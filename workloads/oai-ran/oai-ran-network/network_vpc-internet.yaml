apiVersion: infra.nephio.org/v1alpha1
kind: Network
metadata:
  name: vpc-internet
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  topology: nephio
  routingTables:
  - name: vpc-internet
    prefixes:
    - prefix: 172:6::/32
      labels:
        nephio.org/network-name: n3
    - prefix: 172.6.0.0/16
      labels:
        nephio.org/network-name: n3
    interfaces:
    - kind: bridgedomain
      bridgeDomainName: vpc-internet
  bridgeDomains:
  - name: vpc-internet
    interfaces:
    - kind: interface
      selector:
        matchExpressions:
        - {key: nephio.org/cluster-name, operator: Exists}
