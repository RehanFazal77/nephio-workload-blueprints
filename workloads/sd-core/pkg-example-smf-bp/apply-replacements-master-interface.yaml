# Replaces the "master" field in SMF NAD's spec.config
# NAD name follows pattern: smf-<cluster>-<interface>
# If cluster name changes from "core", update the name below
apiVersion: fn.kpt.dev/v1alpha1
kind: ApplyReplacements
metadata:
  name: replace-nad-master-interfaces
  annotations:
    config.kubernetes.io/local-config: "true"
replacements:

  # ── SMF: N4 interface ──────────────────────────────────────────────
  - source:
      kind: ConfigMap
      name: interface-setters
      fieldPath: data.n4-interface
    targets:
      - select:
          kind: NetworkAttachmentDefinition
          name: smf-core-n4
        fieldPaths:
          - spec.config
        options:
          delimiter: '"master":"'
          index: 1

