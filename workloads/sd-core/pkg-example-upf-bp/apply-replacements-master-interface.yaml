# Replaces the "master" field in each UPF NAD's spec.config
# NAD names follow pattern: upf-<cluster>-<interface>
# If cluster name changes from "core", update the names below
apiVersion: fn.kpt.dev/v1alpha1
kind: ApplyReplacements
metadata:
  name: replace-nad-master-interfaces
  annotations:
    config.kubernetes.io/local-config: "true"
replacements:

  # ── UPF: N3 interface ──────────────────────────────────────────────
  - source:
      kind: ConfigMap
      name: interface-setters
      fieldPath: data.n3-interface
    targets:
      - select:
          kind: NetworkAttachmentDefinition
          name: upf-core-n3
        fieldPaths:
          - spec.config
        options:
          delimiter: '"master":"'
          index: 1

  # ── UPF: N4 interface ──────────────────────────────────────────────
  - source:
      kind: ConfigMap
      name: interface-setters
      fieldPath: data.n4-interface
    targets:
      - select:
          kind: NetworkAttachmentDefinition
          name: upf-core-n4
        fieldPaths:
          - spec.config
        options:
          delimiter: '"master":"'
          index: 1

  # ── UPF: N6 interface ──────────────────────────────────────────────
  - source:
      kind: ConfigMap
      name: interface-setters
      fieldPath: data.n6-interface
    targets:
      - select:
          kind: NetworkAttachmentDefinition
          name: upf-core-n6
        fieldPaths:
          - spec.config
        options:
          delimiter: '"master":"'
          index: 1

